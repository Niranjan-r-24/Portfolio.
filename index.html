/* ─── Typewriter ────────────────────────────────────── */
function useTypewriter(words) {
  const [display, setDisplay] = useState("");
  const [wIdx, setWIdx]       = useState(0);
  const ref = useRef({ i: 0, dir: 1, timer: null });

  useEffect(() => {
    const word = words[wIdx];
    const tick = () => {
      const r = ref.current;
      if (r.dir === 1) {
        r.i = Math.min(r.i + 1, word.length);
        setDisplay(word.slice(0, r.i));
        r.timer = setTimeout(tick, r.i === word.length ? 1600 : 80);
        if (r.i === word.length) r.dir = -1;
      } else {
        r.i = Math.max(r.i - 1, 0);
        setDisplay(word.slice(0, r.i));
        if (r.i === 0) { r.dir = 1; setWIdx(p => (p + 1) % words.length); }
        else r.timer = setTimeout(tick, 38);
      }
    };
    ref.current.timer = setTimeout(tick, 300);
    return () => clearTimeout(ref.current.timer);
  }, [wIdx]);

  return display;
}

/* ─── Intersection Observer hook ────────────────────── */
function useVisible(threshold = 0.15) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setVis(true); obs.disconnect(); } },
      { threshold }
    );
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, vis];
}

  ];
  return (
    <section id="contact" ref={ref} style={{
      padding: "100px 6%", background: "#060d1a", borderTop: "1px solid #121f36",
      opacity: vis ? 1 : 0, transform: vis ? "none" : "translateY(24px)",
      transition: "opacity .65s ease, transform .65s ease",
    }}>
      <div style={{ maxWidth: 900, margin: "0 auto" }}>
        <SectionLabel text="Contact" />
        <h2 className="section-h2">
          Let's <span className="accent">Connect</span>
        </h2>
        <p style={{ color: "#4a6890", fontSize: 15, lineHeight: 1.85, marginBottom: 44, maxWidth: 480 }}>
          Open to Full Stack, AI Engineering, and Python developer roles — primarily in Bangalore.
          Let's build something great together.
        </p>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {links.map(l => (
            <a key={l.label} href={l.href} target="_blank" rel="noopener noreferrer"
              className="contact-row">
              <span style={{ fontSize: 20, minWidth: 24 }}>{l.icon}</span>
              <div>
                <p style={{
                  fontSize: 10, color: "#2a4060", textTransform: "uppercase",
                  letterSpacing: ".12em", fontWeight: 700,
                }}>{l.label}</p>
                <p style={{ fontSize: 14, fontWeight: 600, marginTop: 2 }}>{l.value}</p>
              </div>
              <span style={{ marginLeft: "auto", color: "#38f9d7", fontSize: 18 }}>→</span>
            </a>
          ))}
        </div>
      </div>
    </section>
  );
}

function Footer() {
  return (
    <footer style={{
      padding: "28px 6%", borderTop: "1px solid #121f36",
      display: "flex", alignItems: "center", justifyContent: "center",
    }}>
      <p style={{
        fontFamily: "'JetBrains Mono',monospace", color: "#1c3050", fontSize: 12,
      }}>
        © 2026 Niranjan R — Built with React
        <span style={{ color: "#38f9d7", marginLeft: 8 }}>✦</span>
      </p>
    </footer>
  );
}

function App() {
  return (
    <>
      <Nav />
      <Hero />
      <About />
      <Skills />
      <Projects />
      <Experience />
      <Certifications />
      <Contact />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
